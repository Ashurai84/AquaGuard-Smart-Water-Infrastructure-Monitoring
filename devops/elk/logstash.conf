input {
  beats {
    port => 5044
  }
}

filter {
  if [type] == "aquaguard-logs" {
    json {
      source => "message"
    }
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "aquaguard-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
