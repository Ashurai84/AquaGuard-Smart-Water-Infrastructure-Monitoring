apiVersion: apps/v1
kind: Deployment
metadata:
  name: aquaguard-backend
  namespace: default
  labels:
    app: aquaguard-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aquaguard-backend
  template:
    metadata:
      labels:
        app: aquaguard-backend
    spec:
      containers:
      - name: backend
        image: IMAGE_PLACEHOLDER_BACKEND
        ports:
        - containerPort: 5000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PGHOST
          value: "aquaguard-db-service"
        - name: PGUSER
          value: "postgres"
        - name: PGDATABASE
          value: "aquaguard"
        - name: PGPASSWORD
          value: "aquaguardsecurepassword123"
        - name: PGPORT
          value: "5432"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: aquaguard-backend-service
  namespace: default
spec:
  selector:
    app: aquaguard-backend
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
  type: ClusterIP
