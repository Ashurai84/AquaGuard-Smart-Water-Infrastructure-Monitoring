apiVersion: apps/v1
kind: Deployment
metadata:
  name: aquaguard-frontend
  namespace: default
  labels:
    app: aquaguard-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aquaguard-frontend
  template:
    metadata:
      labels:
        app: aquaguard-frontend
    spec:
      containers:
      - name: frontend
        image: IMAGE_PLACEHOLDER_FRONTEND
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: aquaguard-frontend-service
  namespace: default
spec:
  selector:
    app: aquaguard-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
